campaign_name: cost_aware_multi_objective_tradeoff
objectives:
  - name: yield
    direction: maximize
    reference_point: 0.20
  - name: selectivity
    direction: maximize
    reference_point: 0.20
  - name: waste
    direction: minimize
    reference_point: 0.90
variables:
  - name: catalyst_loading
    type: continuous
    lower: 0.02
    upper: 0.20
  - name: reaction_time
    type: integer
    lower: 20
    upper: 90
  - name: base_equivalents
    type: discrete
    values: [0.5, 1.0, 1.5]
  - name: solvent
    type: categorical
    values: [MeCN, DMF, Water]
constraints:
  - name: water_needs_time
    expression: "solvent != 'Water' or reaction_time >= 30"
cost:
  expression: "1.0 + 0.02 * reaction_time + 0.5 * base_equivalents + 1.5 * (solvent == 'Water')"
  weight: 0.35
  budget: 75.0
  candidate_pool_size: 32
  top_k: 12
review:
  enabled: true
bo:
  batch_size: 2
  initial_design_size: 5
  acquisition: qlog_ehvi
  initial_design_method: sobol
  random_seed: 12
  raw_samples: 16
  num_restarts: 2
  mc_samples: 16
  min_normalized_distance: 0.02
