campaign_name: four_objective_solvent_tradeoff
objectives:
  - name: yield
    direction: maximize
    reference_point: 0.20
  - name: selectivity
    direction: maximize
    reference_point: 0.20
  - name: waste
    direction: minimize
    reference_point: 0.90
  - name: energy_use
    direction: minimize
    reference_point: 0.90
variables:
  - name: catalyst_loading
    type: continuous
    lower: 0.02
    upper: 0.20
  - name: reaction_time
    type: integer
    lower: 20
    upper: 90
  - name: base_equivalents
    type: discrete
    values: [0.5, 1.0, 1.5]
  - name: solvent
    type: categorical
    values: [MeCN, DMF, Water]
constraints:
  - name: high_base_limits_loading
    expression: "base_equivalents < 1.5 or catalyst_loading <= 0.18"
bo:
  batch_size: 2
  initial_design_size: 8
  acquisition: qlog_ehvi
  initial_design_method: sobol
  random_seed: 17
  raw_samples: 16
  num_restarts: 2
  mc_samples: 8
  min_normalized_distance: 0.0
