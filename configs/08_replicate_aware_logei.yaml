campaign_name: replicate_aware_photocatalyst
objective:
  name: activity
  direction: maximize

variables:
  - name: precursor_ratio
    type: continuous
    lower: 0.0
    upper: 1.0

  - name: annealing_temperature
    type: integer
    lower: 300
    upper: 800

replicates:
  enabled: true
  suggestion_policy: uncertain_best
  replicate_threshold: 0.10
  min_repeats_at_best: 3
  max_repeats_per_group: 5
  noise_floor: 1.0e-8

bo:
  batch_size: 1
  initial_design_size: 4
  acquisition: log_ei
  initial_design_method: sobol
  random_seed: 23
  raw_samples: 32
  num_restarts: 3
  mc_samples: 32
  min_normalized_distance: 0.02
